version: '3.8'

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-gemma4
    ports:
      - "8001:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN}
    command: >
      --model google/gemma-2-9b-it
      --dtype bfloat16
      --max-model-len 8192
      --gpu-memory-utilization 0.8
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api:
    build: .
    container_name: research-paper-analyzer-api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - /tmp:/tmp
    environment:
      - VLLM_BASE_URL=http://vllm:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      - vllm
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  huggingface_cache:
